# ============================================================
# Raspberry Pi 4 Home Server – Docker Compose
# ============================================================
# Prerequisites:
#   1. cp .env.example .env  and fill in your values
#   2. docker compose up -d
# ============================================================

services:

  # ----------------------------------------------------------
  # DuckDNS – Dynamic DNS updater
  # Keeps your DuckDNS subdomain pointed at your current IP.
  # https://hub.docker.com/r/linuxserver/duckdns
  # ----------------------------------------------------------
  duckdns:
    image: lscr.io/linuxserver/duckdns:latest
    container_name: duckdns
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}
      - SUBDOMAINS=${DUCKDNS_SUBDOMAINS}
      - TOKEN=${DUCKDNS_TOKEN}
      - LOG_FILE=false
    volumes:
      - ${DATA_DIR:-/mnt/data}/duckdns/config:/config

  # ----------------------------------------------------------
  # Jellyfin – Media server
  # https://hub.docker.com/r/linuxserver/jellyfin
  # ----------------------------------------------------------
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}
    volumes:
      - ${DATA_DIR:-/mnt/data}/jellyfin/config:/config
      - ${JELLYFIN_MEDIA_DIR:-/mnt/data/media}:/media
    ports:
      - "8096:8096"   # HTTP UI
      - "8920:8920"   # HTTPS UI (optional)
      - "7359:7359/udp" # local discovery
      - "1900:1900/udp" # DLNA

  # ----------------------------------------------------------
  # Samba – Network file shares (SMB/CIFS)
  # https://hub.docker.com/r/dperson/samba
  # ----------------------------------------------------------
  samba:
    image: dperson/samba:latest
    container_name: samba
    restart: unless-stopped
    environment:
      - TZ=${TZ:-America/New_York}
      - USERID=${PUID:-1000}
      - GROUPID=${PGID:-1000}
    volumes:
      - ${DATA_DIR:-/mnt/data}/samba/config:/etc/samba
      - ${DATA_DIR:-/mnt/data}/media:/mnt/media
      - ${DATA_DIR:-/mnt/data}/shared:/mnt/shared
    ports:
      - "139:139"
      - "445:445"
    command: >
      -u "smbuser;${SAMBA_PASSWORD}"
      -s "media;/mnt/media;yes;no;no;smbuser"
      -s "shared;/mnt/shared;yes;no;no;smbuser"

  # ----------------------------------------------------------
  # Pi-hole – Network-wide ad blocking / local DNS
  # https://hub.docker.com/r/pihole/pihole
  # ----------------------------------------------------------
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    restart: unless-stopped
    environment:
      - TZ=${TZ:-America/New_York}
      - WEBPASSWORD=${PIHOLE_WEB_PASSWORD}
      - FTLCONF_LOCAL_IPV4=${SERVER_IP:-192.168.1.100}
      - PIHOLE_DNS_=${PIHOLE_DNS:-8.8.8.8;8.8.4.4}
    volumes:
      - ${DATA_DIR:-/mnt/data}/pihole/etc-pihole:/etc/pihole
      - ${DATA_DIR:-/mnt/data}/pihole/etc-dnsmasq.d:/etc/dnsmasq.d
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8080:80"   # Pi-hole admin web UI
    cap_add:
      - NET_ADMIN
    dns:
      - 127.0.0.1
      - ${PIHOLE_DNS:-8.8.8.8}

  # ----------------------------------------------------------
  # PostgreSQL – Relational database
  # Used by Open WebUI and other services requiring persistence.
  # https://hub.docker.com/_/postgres
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-homeserver}
      - TZ=${TZ:-America/New_York}
    volumes:
      - ${DATA_DIR:-/mnt/data}/postgres/data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # Open WebUI – Browser-based frontend for Ollama
  # Connects to an Ollama instance running elsewhere on your LAN.
  # Stores conversation history in PostgreSQL.
  # https://github.com/open-webui/open-webui
  # ----------------------------------------------------------
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://192.168.1.200:11434}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-homeserver}
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-change-this-secret}
    volumes:
      - ${DATA_DIR:-/mnt/data}/open-webui:/app/backend/data
    ports:
      - "3000:8080"  # Open WebUI

networks:
  default:
    driver: bridge
