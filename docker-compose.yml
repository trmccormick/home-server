# ============================================================
# Raspberry Pi 4 Home Server – Docker Compose
# ============================================================
# Prerequisites:
#   1. Copy env examples:  cp env/<service>.env.example env/<service>.env
#   2. Edit each env/<service>.env with your real values
#   3. docker compose up -d
# ============================================================

services:

  # ----------------------------------------------------------
  # DuckDNS – Dynamic DNS updater
  # Keeps your DuckDNS subdomain pointed at your current IP.
  # https://hub.docker.com/r/linuxserver/duckdns
  # ----------------------------------------------------------
  duckdns:
    image: lscr.io/linuxserver/duckdns:latest
    container_name: duckdns
    restart: unless-stopped
    env_file:
      - ./env/common.env
      - ./env/duckdns.env
    volumes:
      - ./data/duckdns/config:/config

  # ----------------------------------------------------------
  # Jellyfin – Media server
  # https://hub.docker.com/r/linuxserver/jellyfin
  # ----------------------------------------------------------
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    env_file:
      - ./env/common.env
    volumes:
      - ./data/jellyfin/config:/config
      - ./data/media:/media
    ports:
      - "8096:8096"   # HTTP UI
      - "8920:8920"   # HTTPS UI (optional)
      - "7359:7359/udp" # local discovery
      - "1900:1900/udp" # DLNA

  # ----------------------------------------------------------
  # Samba – Network file shares (SMB/CIFS)
  # https://hub.docker.com/r/dperson/samba
  # ----------------------------------------------------------
  samba:
    image: dperson/samba:latest
    container_name: samba
    restart: unless-stopped
    env_file:
      - ./env/common.env
      - ./env/samba.env
    # Use bash -c so that $SAMBA_PASSWORD is expanded from the container
    # environment (set via env_file above) rather than at compose-parse time.
    entrypoint: ["/sbin/tini", "--", "/bin/bash", "-c"]
    command:
      - '/usr/bin/samba.sh -u "smbuser;$$SAMBA_PASSWORD" -s "media;/mnt/media;yes;no;no;smbuser" -s "shared;/mnt/shared;yes;no;no;smbuser"'
    volumes:
      - ./data/samba/config:/etc/samba
      - ./data/media:/mnt/media
      - ./data/shared:/mnt/shared
    ports:
      - "139:139"
      - "445:445"

  # ----------------------------------------------------------
  # Pi-hole – Network-wide ad blocking / local DNS
  # https://hub.docker.com/r/pihole/pihole
  # ----------------------------------------------------------
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    restart: unless-stopped
    env_file:
      - ./env/common.env
      - ./env/pihole.env
    volumes:
      - ./data/pihole/etc-pihole:/etc/pihole
      - ./data/pihole/etc-dnsmasq.d:/etc/dnsmasq.d
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8080:80"   # Pi-hole admin web UI
    cap_add:
      - NET_ADMIN
    dns:
      - 127.0.0.1
      - 8.8.8.8

  # ----------------------------------------------------------
  # PostgreSQL – Relational database
  # Used by Open WebUI and other services requiring persistence.
  # https://hub.docker.com/_/postgres
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    env_file:
      - ./env/common.env
      - ./env/postgres.env
    volumes:
      - ./data/postgres/data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      # $$ prevents compose-time interpolation; the variable is expanded at
      # runtime inside the container from the env_file above.
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-admin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # Open WebUI – Browser-based frontend for Ollama
  # Connects to an Ollama instance running elsewhere on your LAN.
  # Stores conversation history in PostgreSQL.
  # https://github.com/open-webui/open-webui
  # ----------------------------------------------------------
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./env/common.env
      - ./env/open-webui.env
    volumes:
      - ./data/open-webui:/app/backend/data
    ports:
      - "3000:8080"  # Open WebUI

  # ----------------------------------------------------------
  # Portainer – Docker management UI
  # Manage containers, images, volumes, and networks via browser.
  # https://hub.docker.com/r/portainer/portainer-ce
  # ----------------------------------------------------------
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/portainer:/data
    ports:
      - "9000:9000"   # HTTP UI
      - "9443:9443"   # HTTPS UI

networks:
  default:
    driver: bridge
