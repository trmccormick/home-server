#======================= Global Settings =======================

[global]

## Browsing/Identification ###

   workgroup = WORKGROUP
   server string = %h server
   netbios name = raspberrypi
   security = user
   dns proxy = no

   server min protocol = SMB2
   server max protocol = SMB3
   server signing = mandatory

#### Debugging/Accounting ####

   log file = /var/log/samba/log.%m
   max log size = 1000
   logging = file
   panic action = /usr/share/samba/panic-action %d

####### Authentication #######

   server role = standalone server
   obey pam restrictions = no
   unix password sync = no

   # Performance tuning
   socket options = TCP_NODELAY IPTOS_LOWDELAY
   read raw = yes
   write raw = yes
   oplocks = yes
   max xmit = 65535
   dead time = 15
   getwd cache = yes

#======================= Share Definitions =======================

# ── Data-dir shares (always available) ───────────────────────
[media]
   comment = Media Library
   path = /mnt/media
   browseable = yes
   read only = no
   guest ok = no
   valid users = smbuser
   create mask = 0664
   directory mask = 0775
   force user = smbuser

[shared]
   comment = Shared Files
   path = /mnt/shared
   browseable = yes
   read only = no
   guest ok = no
   valid users = smbuser
   create mask = 0664
   directory mask = 0775
   force user = smbuser

