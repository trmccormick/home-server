[global]
   workgroup = WORKGROUP
   server string = Raspberry Pi Home Server
   netbios name = raspberrypi
   security = user
   map to guest = bad user
   dns proxy = no
   log file = /var/log/samba/log.%m
   max log size = 1000
   logging = file
   panic action = /usr/share/samba/panic-action %d

   # Performance tuning for Raspberry Pi
   socket options = TCP_NODELAY IPTOS_LOWDELAY
   read raw = yes
   write raw = yes
   oplocks = yes
   max xmit = 65535
   dead time = 15
   getwd cache = yes

[media]
   comment = Media Library
   path = /mnt/media
   browseable = yes
   read only = no
   guest ok = no
   valid users = smbuser
   create mask = 0664
   directory mask = 0775
   force user = smbuser

[shared]
   comment = Shared Files
   path = /mnt/shared
   browseable = yes
   read only = no
   guest ok = no
   valid users = smbuser
   create mask = 0664
   directory mask = 0775
   force user = smbuser
